<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>strfry-86</title>
<style>
body { max-width: 40em; margin: 0 auto; padding: 0 1em; }
li { overflow-wrap: anywhere; }
@media (max-width: 600px) { body { font-size: 1.15em; } }
</style>
</head>
<body>
<h1>strfry-86</h1>
<button id="login-btn" type="button">Login with extension</button>
<p id="status"></p>

<div id="notices-section" style="display:none">
  <h2>Notices</h2>
  <p id="notices-warning" style="display:none"></p>
  <p id="notices-empty" style="display:none">No notices.</p>
  <div id="notices-list"></div>
</div>

<div id="activity-section" style="display:none">
  <h2>Activity</h2>
  <div id="activity-list"></div>
</div>

<div id="admin-controls" style="display:none">
  <h2>Ban a pubkey</h2>
  <form id="ban-form">
    <div><input id="ban-input" type="text" placeholder="npub or hex, one or more (comma/space separated)"></div>
    <div><input id="ban-reason" type="text" placeholder="reason (optional)"></div>
    <button type="submit">Ban</button>
  </form>
</div>

<p>These npubs are banned from this relay.</p>
<p id="appeal-line" style="display:none"></p>
<button id="unban-btn" type="button" style="display:none">Unban selected</button>
<ul id="ban-list"></ul>
<script>
var NAME_CACHE_KEY = 'strfry86_name_cache';
var NAME_TTL_MS = 24 * 60 * 60 * 1000;

var adminPubkey = null;
var loggedInPubkey = null;
var isAdmin = false;
var lastBanned = [];
var nameSpans = {}; // pubkey -> array of span elements to fill

var statusEl = document.getElementById('status');
var loginBtn = document.getElementById('login-btn');
var noticesSection = document.getElementById('notices-section');
var noticesWarning = document.getElementById('notices-warning');
var noticesEmpty = document.getElementById('notices-empty');
var noticesList = document.getElementById('notices-list');
var activitySection = document.getElementById('activity-section');
var activityList = document.getElementById('activity-list');
var adminControls = document.getElementById('admin-controls');
var appealEl = document.getElementById('appeal-line');
var unbanBtn = document.getElementById('unban-btn');
var banForm = document.getElementById('ban-form');
var banInput = document.getElementById('ban-input');
var banReason = document.getElementById('ban-reason');
var listEl = document.getElementById('ban-list');

function setStatus(text) {
  statusEl.textContent = text;
}

// --- minimal inline bech32 (BIP-173), npub-encode only -----------------
// /api/audit deals in hex pubkeys only; the ban list already gets npubs
// from the server, but audit notices need to be encoded client-side.

var BECH32_CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';

function bech32Polymod(values) {
  var GEN = [0x3b6a57b2, 0x26508e6d, 0x1ea119fa, 0x3d4233dd, 0x2a1462b3];
  var chk = 1;
  for (var p = 0; p < values.length; p++) {
    var top = chk >>> 25;
    chk = (((chk & 0x1ffffff) << 5) ^ values[p]) >>> 0;
    for (var i = 0; i < 5; i++) {
      if ((top >>> i) & 1) {
        chk = (chk ^ GEN[i]) >>> 0;
      }
    }
  }
  return chk >>> 0;
}

function bech32HrpExpand(hrp) {
  var ret = [];
  for (var i = 0; i < hrp.length; i++) { ret.push(hrp.charCodeAt(i) >> 5); }
  ret.push(0);
  for (var i = 0; i < hrp.length; i++) { ret.push(hrp.charCodeAt(i) & 31); }
  return ret;
}

function bech32CreateChecksum(hrp, data) {
  var values = bech32HrpExpand(hrp).concat(data).concat([0, 0, 0, 0, 0, 0]);
  var polymod = bech32Polymod(values) ^ 1;
  var ret = [];
  for (var i = 0; i < 6; i++) {
    ret.push((polymod >>> (5 * (5 - i))) & 31);
  }
  return ret;
}

function bech32Encode(hrp, data) {
  var combined = data.concat(bech32CreateChecksum(hrp, data));
  var out = hrp + '1';
  for (var i = 0; i < combined.length; i++) {
    out += BECH32_CHARSET.charAt(combined[i]);
  }
  return out;
}

function convertBits8to5(bytes) {
  var acc = 0, bits = 0, ret = [];
  var maxv = 31;
  for (var i = 0; i < bytes.length; i++) {
    acc = ((acc << 8) | bytes[i]) >>> 0;
    bits += 8;
    while (bits >= 5) {
      bits -= 5;
      ret.push((acc >>> bits) & maxv);
    }
  }
  if (bits > 0) {
    ret.push((acc << (5 - bits)) & maxv);
  }
  return ret;
}

function hexToNpub(hex) {
  var bytes = [];
  for (var i = 0; i < hex.length; i += 2) {
    bytes.push(parseInt(hex.substr(i, 2), 16));
  }
  return bech32Encode('npub', convertBits8to5(bytes));
}

function njumpLink(hex) {
  var npub;
  try {
    npub = hexToNpub(hex);
  } catch (e) {
    npub = hex;
  }
  var link = document.createElement('a');
  link.href = 'https://njump.me/' + npub;
  link.target = '_blank';
  link.textContent = npub;
  return link;
}

// --- ban list ------------------------------------------------------------

function loadNameCache() {
  try {
    return JSON.parse(localStorage.getItem(NAME_CACHE_KEY)) || {};
  } catch (e) {
    return {};
  }
}

function saveNameCache(cache) {
  try {
    localStorage.setItem(NAME_CACHE_KEY, JSON.stringify(cache));
  } catch (e) {
    // ignore quota/availability errors — display sugar only
  }
}

function formatDate(bannedAt) {
  if (!bannedAt) {
    return 'unknown date';
  }
  var iso = new Date(bannedAt * 1000).toISOString();
  return iso.slice(0, 10) + '@' + iso.slice(11, 16) + ' UTC';
}

function renderBans(banned) {
  lastBanned = banned;
  nameSpans = {};
  listEl.textContent = '';
  for (var i = 0; i < banned.length; i++) {
    var ban = banned[i];
    var li = document.createElement('li');

    if (isAdmin) {
      var checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.value = ban.pubkey;
      checkbox.className = 'ban-checkbox';
      li.appendChild(checkbox);
      li.appendChild(document.createTextNode(' '));
    }

    var nameSpan = document.createElement('b');
    if (ban.name) {
      nameSpan.textContent = ban.name + ' ';
    }
    li.appendChild(nameSpan);
    if (!nameSpans[ban.pubkey]) {
      nameSpans[ban.pubkey] = [];
    }
    nameSpans[ban.pubkey].push(nameSpan);

    var link = document.createElement('a');
    link.href = 'https://njump.me/' + ban.npub;
    link.target = '_blank';
    link.textContent = ban.npub;
    li.appendChild(link);

    var dateEl = document.createElement('i');
    dateEl.textContent = formatDate(ban.banned_at);
    li.appendChild(document.createTextNode(' — '));
    li.appendChild(dateEl);

    if (ban.report_type) {
      li.appendChild(document.createTextNode(' — '));
      var typeSpan = document.createElement('span');
      typeSpan.textContent = ban.report_type;
      li.appendChild(typeSpan);
    }

    if (ban.reason) {
      li.appendChild(document.createTextNode(' — '));
      var reasonSpan = document.createElement('span');
      reasonSpan.textContent = ban.reason;
      li.appendChild(reasonSpan);
    }

    listEl.appendChild(li);
  }

  resolveFallbackNames(banned);
}

function resolveFallbackNames(banned) {
  var cache = loadNameCache();
  var now = Date.now();
  var needQuery = [];

  for (var i = 0; i < banned.length; i++) {
    var ban = banned[i];
    if (ban.name) {
      continue;
    }
    var cached = cache[ban.pubkey];
    if (cached && (cached.name || (now - cached.checked_at) < NAME_TTL_MS)) {
      if (cached.name) {
        fillName(ban.pubkey, cached.name);
      }
      continue;
    }
    if (needQuery.indexOf(ban.pubkey) === -1) {
      needQuery.push(ban.pubkey);
    }
  }

  if (needQuery.length === 0) {
    return;
  }

  queryRelay('wss://purplepag.es', needQuery, function (ok) {
    if (!ok) {
      queryRelay('wss://relay.damus.io', needQuery, function () {});
    }
  });
}

function fillName(pubkey, name) {
  var spans = nameSpans[pubkey];
  if (!spans) {
    return;
  }
  for (var i = 0; i < spans.length; i++) {
    spans[i].textContent = name + ' ';
  }
}

function queryRelay(url, pubkeys, done) {
  var cache = loadNameCache();
  var now = Date.now();
  var settled = false;
  var connected = false;
  var ws;

  function finish(ok) {
    if (settled) {
      return;
    }
    settled = true;
    try {
      ws.close();
    } catch (e) {}
    done(ok);
  }

  try {
    ws = new WebSocket(url);
  } catch (e) {
    finish(false);
    return;
  }

  var timeout = setTimeout(function () {
    saveNameCache(cache);
    finish(connected);
  }, 5000);

  ws.addEventListener('open', function () {
    connected = true;
    ws.send(JSON.stringify(['REQ', 'strfry86', { kinds: [0], authors: pubkeys }]));
  });

  ws.addEventListener('message', function (evt) {
    var msg;
    try {
      msg = JSON.parse(evt.data);
    } catch (e) {
      return;
    }
    if (!Array.isArray(msg)) {
      return;
    }
    if (msg[0] === 'EVENT' && msg[2]) {
      var ev = msg[2];
      var content;
      try {
        content = JSON.parse(ev.content);
      } catch (e) {
        content = {};
      }
      var name = content.display_name || content.name || null;
      cache[ev.pubkey] = { name: name, checked_at: now };
      if (name) {
        fillName(ev.pubkey, name);
      }
    } else if (msg[0] === 'EOSE') {
      for (var i = 0; i < pubkeys.length; i++) {
        if (!cache[pubkeys[i]]) {
          cache[pubkeys[i]] = { name: null, checked_at: now };
        }
      }
      clearTimeout(timeout);
      saveNameCache(cache);
      finish(true);
    }
  });

  ws.addEventListener('error', function () {
    clearTimeout(timeout);
    finish(connected);
  });

  ws.addEventListener('close', function () {
    clearTimeout(timeout);
    finish(connected);
  });
}

function renderAppeal(contactAppeal) {
  var trimmed = (contactAppeal || '').trim();
  if (!trimmed) {
    appealEl.textContent = '';
    appealEl.style.display = 'none';
    return;
  }
  appealEl.textContent = 'To appeal, contact: ' + trimmed;
  appealEl.style.display = '';
}

function loadBans() {
  return fetch('/api/banned')
    .then(function (res) { return res.json(); })
    .then(function (data) {
      adminPubkey = data.admin;
      renderAppeal(data.contact_appeal);
      renderBans(data.banned);
    })
    .catch(function () {
      setStatus('failed to load ban list');
    });
}

// --- audit: notices --------------------------------------------------------

function renderNotices(auditData) {
  if (auditData.warning) {
    noticesWarning.textContent = auditData.warning;
    noticesWarning.style.display = '';
  } else {
    noticesWarning.textContent = '';
    noticesWarning.style.display = 'none';
  }

  noticesList.textContent = '';
  var notices = auditData.notices || [];
  if (notices.length === 0) {
    noticesEmpty.style.display = '';
  } else {
    noticesEmpty.style.display = 'none';
    for (var i = 0; i < notices.length; i++) {
      noticesList.appendChild(buildNoticeDetails(notices[i]));
    }
  }
}

function buildNoticeDetails(notice) {
  var details = document.createElement('details');
  var summary = document.createElement('summary');
  summary.textContent = notice.text;
  details.appendChild(summary);

  if (notice.type === 'purge_pending') {
    details.appendChild(buildPurgePendingBody(notice));
  } else {
    details.appendChild(buildActionableBody(notice));
  }
  return details;
}

function buildPurgePendingBody(notice) {
  var frag = document.createDocumentFragment();
  var ul = document.createElement('ul');
  var pubkeys = notice.pubkeys || [];
  for (var i = 0; i < pubkeys.length; i++) {
    var li = document.createElement('li');
    li.appendChild(njumpLink(pubkeys[i]));
    ul.appendChild(li);
  }
  frag.appendChild(ul);

  var cmd = 'strfry delete --filter \'' + JSON.stringify({ authors: pubkeys }) + '\'';
  var p = document.createElement('p');
  var code = document.createElement('code');
  code.textContent = cmd;
  p.appendChild(code);
  frag.appendChild(p);
  return frag;
}

function buildActionableBody(notice) {
  var frag = document.createDocumentFragment();
  var banBtn = document.createElement('button');
  banBtn.type = 'button';
  banBtn.textContent = 'Ban selected';
  frag.appendChild(banBtn);

  var ul = document.createElement('ul');
  var pubkeys = notice.pubkeys || [];
  for (var i = 0; i < pubkeys.length; i++) {
    var pk = pubkeys[i];
    var li = document.createElement('li');
    var checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = true;
    checkbox.value = pk;
    li.appendChild(checkbox);
    li.appendChild(document.createTextNode(' '));
    li.appendChild(njumpLink(pk));
    ul.appendChild(li);
  }
  frag.appendChild(ul);

  banBtn.addEventListener('click', function () {
    if (!isAdmin) {
      return;
    }
    var checked = ul.querySelectorAll('input[type=checkbox]:checked');
    var selected = [];
    for (var j = 0; j < checked.length; j++) {
      selected.push(checked[j].value);
    }
    if (selected.length === 0) {
      setStatus('nothing selected');
      return;
    }
    var entries = selected.map(function (pk) {
      return { pubkey: pk, reason: notice.suggested_reason || '', report_type: 'audit' };
    });
    signAndPost('/api/ban', { entries: entries })
      .then(function (result) {
        if (!result.ok) {
          setStatus('ban failed: ' + (result.body && result.body.error ? result.body.error : 'unknown error'));
          return;
        }
        setStatus('banned ' + result.body.added.length + ' pubkey(s)');
        return Promise.all([loadBans(), loadAudit()]);
      })
      .catch(function () {
        setStatus('ban failed');
      });
  });

  return frag;
}

// --- audit: activity sparklines --------------------------------------------

function renderActivity(activity) {
  activityList.textContent = '';
  for (var i = 0; i < activity.length; i++) {
    var entry = activity[i];
    var p = document.createElement('p');
    p.appendChild(document.createTextNode('kind ' + entry.kind + ' '));
    p.appendChild(buildSparkline(entry.days, entry.total));
    p.appendChild(document.createTextNode(' ' + entry.total));
    activityList.appendChild(p);
  }
}

function buildSparkline(days, total) {
  var svgNS = 'http://www.w3.org/2000/svg';
  var width = 120, height = 16;
  var svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);

  var titleEl = document.createElementNS(svgNS, 'title');
  titleEl.textContent = total + ' events in 28 days';
  svg.appendChild(titleEl);

  var max = 0;
  for (var i = 0; i < days.length; i++) {
    if (days[i] > max) {
      max = days[i];
    }
  }

  var n = days.length;
  var points = [];
  for (var i = 0; i < n; i++) {
    var x = (n <= 1) ? 0 : (i / (n - 1)) * width;
    var y = max > 0 ? height - (days[i] / max) * height : height;
    points.push(x.toFixed(2) + ',' + y.toFixed(2));
  }

  var polyline = document.createElementNS(svgNS, 'polyline');
  polyline.setAttribute('points', points.join(' '));
  polyline.setAttribute('fill', 'none');
  polyline.setAttribute('stroke', 'currentColor');
  polyline.setAttribute('stroke-width', '1');
  svg.appendChild(polyline);

  return svg;
}

function loadAudit() {
  return fetch('/api/audit')
    .then(function (res) { return res.json(); })
    .then(function (data) {
      renderNotices(data);
      renderActivity(data.activity || []);
    })
    .catch(function () {
      setStatus('failed to load audit');
    });
}

// --- login / actions --------------------------------------------------------

loginBtn.addEventListener('click', function () {
  if (isAdmin) {
    window.location.reload();
    return;
  }
  if (!window.nostr) {
    setStatus('a NIP-07 extension is required');
    return;
  }
  window.nostr.getPublicKey()
    .then(function (pk) {
      if (pk !== adminPubkey) {
        setStatus('this key is not the admin');
        return;
      }
      loggedInPubkey = pk;
      isAdmin = true;
      setStatus('logged in as admin');
      loginBtn.textContent = 'Logout';
      noticesSection.style.display = '';
      activitySection.style.display = '';
      adminControls.style.display = '';
      unbanBtn.style.display = '';
      renderBans(lastBanned);
      loadAudit();
    })
    .catch(function () {
      setStatus('a NIP-07 extension is required');
    });
});

function signAndPost(endpoint, extraBody) {
  var url = window.location.origin + endpoint;
  var event = {
    kind: 27235,
    created_at: Math.floor(Date.now() / 1000),
    tags: [['u', url], ['method', 'POST']],
    content: ''
  };

  return window.nostr.signEvent(event)
    .then(function (signed) {
      var body = Object.assign({ auth: signed }, extraBody);
      return fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    })
    .then(function (res) {
      return res.json().then(function (body) {
        return { ok: res.ok, body: body };
      });
    });
}

unbanBtn.addEventListener('click', function () {
  if (!isAdmin) {
    return;
  }
  var checkboxes = listEl.querySelectorAll('.ban-checkbox:checked');
  var selected = [];
  for (var i = 0; i < checkboxes.length; i++) {
    selected.push(checkboxes[i].value);
  }
  if (selected.length === 0) {
    setStatus('nothing selected');
    return;
  }

  signAndPost('/api/unban', { pubkeys: selected })
    .then(function (result) {
      if (!result.ok) {
        setStatus('unban failed: ' + (result.body && result.body.error ? result.body.error : 'unknown error'));
        return;
      }
      setStatus('unbanned ' + result.body.removed.length + ' pubkey(s)');
      return loadBans();
    })
    .catch(function () {
      setStatus('unban failed');
    });
});

banForm.addEventListener('submit', function (evt) {
  evt.preventDefault();
  if (!isAdmin) {
    return;
  }
  var raw = banInput.value.split(/[\s,]+/).map(function (s) { return s.trim(); }).filter(Boolean);
  if (raw.length === 0) {
    setStatus('nothing to ban');
    return;
  }
  var reason = banReason.value;
  var entries = raw.map(function (pk) {
    return { pubkey: pk, reason: reason };
  });

  signAndPost('/api/ban', { entries: entries })
    .then(function (result) {
      if (!result.ok) {
        setStatus('ban failed: ' + (result.body && result.body.error ? result.body.error : 'unknown error'));
        return;
      }
      setStatus('banned ' + result.body.added.length + ' pubkey(s)'
        + (result.body.skipped.length ? ', skipped ' + result.body.skipped.length : ''));
      banInput.value = '';
      banReason.value = '';
      return loadBans();
    })
    .catch(function () {
      setStatus('ban failed');
    });
});

loadBans();
</script>
</body>
</html>
