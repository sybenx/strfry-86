<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>strfry-86</title>
<style>
body { max-width: 40em; margin: 0 auto; padding: 0 1em; }
li { overflow-wrap: anywhere; }
@media (max-width: 600px) { body { font-size: 1.15em; } }
</style>
</head>
<body>
<h1>strfry-86</h1>
<button id="login-btn" type="button">Login with extension</button>
<p id="status"></p>
<div id="activity-section" style="display:none">
  <h2>Activity</h2>
  <p id="activity-warning"></p>
  <div id="activity-list"></div>
</div>
<div id="admin-controls" style="display:none">
  <h2>Ban a pubkey</h2>
  <form id="ban-form">
    <div><input id="ban-input" type="text" placeholder="npub or hex, one or more (comma/space separated)"></div>
    <div><input id="ban-reason" type="text" placeholder="reason (optional)"></div>
    <button type="submit">Ban</button>
  </form>
  <div id="undo-list"></div>
</div>
<p>These npubs are banned from this relay.</p>
<p id="appeal-line" style="display:none"></p>
<p><input id="filter-input" type="search" placeholder="filter bans"></p>
<label id="select-all-label" style="display:none"><input id="select-all" type="checkbox"> Select all</label>
<button id="unban-btn" type="button" style="display:none">Unban selected</button> <b id="selected-count"></b>
<ul id="ban-list"></ul>
<script>
var NAME_CACHE_KEY = 'strfry86_name_cache';
var NAME_TTL_MS = 24 * 60 * 60 * 1000;
var RECORDS_KEY = 'strfry86_records';
var DISMISSED_REPORTS_KEY = 'strfry86_dismissed_reports';
var MAX_RECORDS = 200;
var MAX_DISMISSED = 1000;

var adminPubkey = null;
var loggedInPubkey = null;
var isAdmin = false;
var lastBanned = [];
var nameSpans = {}; // pubkey -> array of span elements to fill
var nip05Spans = {}; // pubkey -> array of span elements to fill

var statusEl = document.getElementById('status');
var loginBtn = document.getElementById('login-btn');
var activitySection = document.getElementById('activity-section');
var activityWarning = document.getElementById('activity-warning');
var activityList = document.getElementById('activity-list');
var adminControls = document.getElementById('admin-controls');
var appealEl = document.getElementById('appeal-line');
var unbanBtn = document.getElementById('unban-btn');
var banForm = document.getElementById('ban-form');
var banInput = document.getElementById('ban-input');
var banReason = document.getElementById('ban-reason');
var listEl = document.getElementById('ban-list');
var filterInput = document.getElementById('filter-input');
var selectAllLabel = document.getElementById('select-all-label');
var selectAll = document.getElementById('select-all');
var undoList = document.getElementById('undo-list');
var selectedCount = document.getElementById('selected-count');

function setStatus(text) {
  statusEl.textContent = text;
}

function loadNameCache() {
  try {
    return JSON.parse(localStorage.getItem(NAME_CACHE_KEY)) || {};
  } catch (e) {
    return {};
  }
}

function saveNameCache(cache) {
  try {
    localStorage.setItem(NAME_CACHE_KEY, JSON.stringify(cache));
  } catch (e) {
    // ignore quota/availability errors — display sugar only
  }
}

function formatDate(bannedAt) {
  if (!bannedAt) {
    return 'unknown date';
  }
  var iso = new Date(bannedAt * 1000).toISOString();
  return iso.slice(0, 10) + '@' + iso.slice(11, 16) + ' UTC';
}

function renderBans(banned) {
  lastBanned = banned;
  nameSpans = {};
  nip05Spans = {};
  selectAll.checked = false;
  listEl.textContent = '';
  for (var i = 0; i < banned.length; i++) {
    var ban = banned[i];
    var li = document.createElement('li');

    if (isAdmin) {
      var checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.value = ban.pubkey;
      checkbox.className = 'ban-checkbox';
      li.appendChild(checkbox);
      li.appendChild(document.createTextNode(' '));
    }

    var nameSpan = document.createElement('b');
    if (ban.name) {
      nameSpan.textContent = ban.name + ' ';
    }
    li.appendChild(nameSpan);
    if (!nameSpans[ban.pubkey]) {
      nameSpans[ban.pubkey] = [];
    }
    nameSpans[ban.pubkey].push(nameSpan);

    var nip05Span = document.createElement('span');
    if (ban.nip05) {
      nip05Span.textContent = ban.nip05 + ' ';
    }
    li.appendChild(nip05Span);
    if (!nip05Spans[ban.pubkey]) {
      nip05Spans[ban.pubkey] = [];
    }
    nip05Spans[ban.pubkey].push(nip05Span);

    var link = document.createElement('a');
    link.href = 'https://njump.me/' + ban.npub;
    link.target = '_blank';
    link.textContent = ban.npub;
    li.appendChild(link);

    var dateEl = document.createElement('i');
    dateEl.textContent = formatDate(ban.banned_at);
    li.appendChild(document.createTextNode(' — '));
    li.appendChild(dateEl);

    if (ban.report_type) {
      li.appendChild(document.createTextNode(' — '));
      var typeSpan = document.createElement('span');
      typeSpan.textContent = ban.report_type;
      li.appendChild(typeSpan);
    }

    if (ban.reason) {
      li.appendChild(document.createTextNode(' — '));
      var reasonSpan = document.createElement('span');
      reasonSpan.textContent = ban.reason;
      li.appendChild(reasonSpan);
    }

    listEl.appendChild(li);
  }

  applyFilter();
  updateSelectedCount();
  renderRecords();
  resolveFallbackNames(banned);
}

function updateSelectedCount() {
  var n = listEl.querySelectorAll('.ban-checkbox:checked').length;
  selectedCount.textContent = n > 0 ? n + ' selected' : '';
}

function applyFilter() {
  var query = filterInput.value.trim().toLowerCase();
  var items = listEl.children;
  for (var i = 0; i < items.length; i++) {
    var match = !query || items[i].textContent.toLowerCase().indexOf(query) !== -1;
    items[i].style.display = match ? '' : 'none';
  }
}

function resolveFallbackNames(banned) {
  var cache = loadNameCache();
  var now = Date.now();
  var needQuery = [];

  for (var i = 0; i < banned.length; i++) {
    var ban = banned[i];
    if (ban.name || ban.nip05) {
      continue;
    }
    var cached = cache[ban.pubkey];
    if (cached && (cached.name || cached.nip05 || (now - cached.checked_at) < NAME_TTL_MS)) {
      if (cached.name) {
        fillName(ban.pubkey, cached.name);
      }
      if (cached.nip05) {
        fillNip05(ban.pubkey, cached.nip05);
      }
      continue;
    }
    if (needQuery.indexOf(ban.pubkey) === -1) {
      needQuery.push(ban.pubkey);
    }
  }

  if (needQuery.length === 0) {
    return;
  }

  queryRelay('wss://purplepag.es', needQuery, function (ok) {
    if (!ok) {
      queryRelay('wss://relay.damus.io', needQuery, function () {});
    }
  });
}

function fillName(pubkey, name) {
  var spans = nameSpans[pubkey];
  if (!spans) {
    return;
  }
  for (var i = 0; i < spans.length; i++) {
    spans[i].textContent = name + ' ';
  }
}

function fillNip05(pubkey, nip05) {
  var spans = nip05Spans[pubkey];
  if (!spans) {
    return;
  }
  for (var i = 0; i < spans.length; i++) {
    spans[i].textContent = nip05 + ' ';
  }
}

function queryRelay(url, pubkeys, done) {
  var cache = loadNameCache();
  var now = Date.now();
  var settled = false;
  var connected = false;
  var ws;

  function finish(ok) {
    if (settled) {
      return;
    }
    settled = true;
    try {
      ws.close();
    } catch (e) {}
    applyFilter();
    done(ok);
  }

  try {
    ws = new WebSocket(url);
  } catch (e) {
    finish(false);
    return;
  }

  var timeout = setTimeout(function () {
    saveNameCache(cache);
    finish(connected);
  }, 5000);

  ws.addEventListener('open', function () {
    connected = true;
    ws.send(JSON.stringify(['REQ', 'strfry86', { kinds: [0], authors: pubkeys }]));
  });

  ws.addEventListener('message', function (evt) {
    var msg;
    try {
      msg = JSON.parse(evt.data);
    } catch (e) {
      return;
    }
    if (!Array.isArray(msg)) {
      return;
    }
    if (msg[0] === 'EVENT' && msg[2]) {
      var ev = msg[2];
      var content;
      try {
        content = JSON.parse(ev.content);
      } catch (e) {
        content = {};
      }
      var name = content.display_name || content.name || null;
      var nip05 = (typeof content.nip05 === 'string' && content.nip05) ? content.nip05 : null;
      cache[ev.pubkey] = { name: name, nip05: nip05, checked_at: now };
      if (name) {
        fillName(ev.pubkey, name);
      }
      if (nip05) {
        fillNip05(ev.pubkey, nip05);
      }
    } else if (msg[0] === 'EOSE') {
      for (var i = 0; i < pubkeys.length; i++) {
        if (!cache[pubkeys[i]]) {
          cache[pubkeys[i]] = { name: null, nip05: null, checked_at: now };
        }
      }
      clearTimeout(timeout);
      saveNameCache(cache);
      finish(true);
    }
  });

  ws.addEventListener('error', function () {
    clearTimeout(timeout);
    finish(connected);
  });

  ws.addEventListener('close', function () {
    clearTimeout(timeout);
    finish(connected);
  });
}

function renderAppeal(contactAppeal) {
  var trimmed = (contactAppeal || '').trim();
  if (!trimmed) {
    appealEl.textContent = '';
    appealEl.style.display = 'none';
    return;
  }
  appealEl.textContent = 'To appeal, contact: ' + trimmed;
  appealEl.style.display = '';
}

function loadBans() {
  return fetch('/api/banned')
    .then(function (res) { return res.json(); })
    .then(function (data) {
      adminPubkey = data.admin;
      renderAppeal(data.contact_appeal);
      renderBans(data.banned);
    })
    .catch(function () {
      setStatus('failed to load ban list');
    });
}

// --- activity sparklines ----------------------------------------------------
// Renders whatever the server sent; computes nothing itself.

function renderActivity(data) {
  activityWarning.textContent = data.warning ? data.warning : '';
  activityList.textContent = '';
  var activity = data.activity || [];
  for (var i = 0; i < activity.length; i++) {
    var entry = activity[i];
    var p = document.createElement('p');
    p.appendChild(document.createTextNode('kind ' + entry.kind + ' '));
    p.appendChild(buildSparkline(entry.days, entry.total));
    p.appendChild(document.createTextNode(' ' + entry.total));
    activityList.appendChild(p);
  }
}

function buildSparkline(days, total) {
  var svgNS = 'http://www.w3.org/2000/svg';
  var width = 120, height = 16;
  var svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);

  var titleEl = document.createElementNS(svgNS, 'title');
  titleEl.textContent = total + ' events in 28 days';
  svg.appendChild(titleEl);

  var max = 0;
  for (var i = 0; i < days.length; i++) {
    if (days[i] > max) {
      max = days[i];
    }
  }

  var n = days.length;
  var points = [];
  for (var i = 0; i < n; i++) {
    var x = (n <= 1) ? 0 : (i / (n - 1)) * width;
    var y = max > 0 ? height - (days[i] / max) * height : height;
    points.push(x.toFixed(2) + ',' + y.toFixed(2));
  }

  var polyline = document.createElementNS(svgNS, 'polyline');
  polyline.setAttribute('points', points.join(' '));
  polyline.setAttribute('fill', 'none');
  polyline.setAttribute('stroke', 'currentColor');
  polyline.setAttribute('stroke-width', '1');
  svg.appendChild(polyline);

  return svg;
}

function loadActivity() {
  return fetch('/api/activity')
    .then(function (res) { return res.json(); })
    .then(function (data) {
      renderActivity(data);
    })
    .catch(function () {
      setStatus('failed to load activity');
    });
}

loginBtn.addEventListener('click', function () {
  if (isAdmin) {
    window.location.reload();
    return;
  }
  if (!window.nostr) {
    setStatus('a NIP-07 extension is required');
    return;
  }
  window.nostr.getPublicKey()
    .then(function (pk) {
      if (pk !== adminPubkey) {
        setStatus('this key is not the admin');
        return;
      }
      loggedInPubkey = pk;
      isAdmin = true;
      setStatus('logged in as admin');
      loginBtn.textContent = 'Logout';
      activitySection.style.display = '';
      adminControls.style.display = '';
      selectAllLabel.style.display = '';
      unbanBtn.style.display = '';
      renderBans(lastBanned);
      loadActivity();
    })
    .catch(function () {
      setStatus('a NIP-07 extension is required');
    });
});

function signAndPost(endpoint, extraBody) {
  var url = window.location.origin + endpoint;
  var event = {
    kind: 27235,
    created_at: Math.floor(Date.now() / 1000),
    tags: [['u', url], ['method', 'POST']],
    content: ''
  };

  return window.nostr.signEvent(event)
    .then(function (signed) {
      var body = Object.assign({ auth: signed }, extraBody);
      return fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    })
    .then(function (res) {
      return res.json().then(function (body) {
        return { ok: res.ok, body: body };
      });
    });
}

filterInput.addEventListener('input', applyFilter);

selectAll.addEventListener('change', function () {
  // Selects only the entries the filter currently shows.
  var checkboxes = listEl.querySelectorAll('.ban-checkbox');
  for (var i = 0; i < checkboxes.length; i++) {
    if (checkboxes[i].parentNode.style.display === 'none') {
      continue;
    }
    checkboxes[i].checked = selectAll.checked;
  }
  updateSelectedCount();
});

listEl.addEventListener('change', updateSelectedCount);

// --- record lines -----------------------------------------------------------
// Persistent admin action log: manual bans, unbans, and report-driven bans
// each get a line with Undo and a ↩ dismiss. Ban/unban records live in
// localStorage until dismissed; report records are derived from the ban list
// (any entry carrying a report_event_id) minus a dismissed-id list.

function findBan(pubkey) {
  for (var i = 0; i < lastBanned.length; i++) {
    if (lastBanned[i].pubkey === pubkey) {
      return lastBanned[i];
    }
  }
  return null;
}

function loadStored(key) {
  try {
    var val = JSON.parse(localStorage.getItem(key));
    return Array.isArray(val) ? val : [];
  } catch (e) {
    return [];
  }
}

function saveStored(key, arr, max) {
  try {
    localStorage.setItem(key, JSON.stringify(arr.slice(-max)));
  } catch (e) {
    // ignore quota/availability errors — records degrade to session-local
  }
}

function addRecord(record) {
  record.id = Date.now() + '-' + Math.random().toString(36).slice(2);
  var records = loadStored(RECORDS_KEY);
  records.push(record);
  saveStored(RECORDS_KEY, records, MAX_RECORDS);
  renderRecords();
}

function removeRecord(id) {
  var records = loadStored(RECORDS_KEY).filter(function (r) { return r.id !== id; });
  saveStored(RECORDS_KEY, records, MAX_RECORDS);
  renderRecords();
}

function dismissReport(id) {
  var ids = loadStored(DISMISSED_REPORTS_KEY);
  if (ids.indexOf(id) === -1) {
    ids.push(id);
  }
  saveStored(DISMISSED_REPORTS_KEY, ids, MAX_DISMISSED);
  renderRecords();
}

function buildRecordLine(labelText, onUndo, onDismiss) {
  var line = document.createElement('p');
  var label = document.createElement('span');
  label.textContent = labelText + ' ';
  line.appendChild(label);

  var undoBtn = document.createElement('button');
  undoBtn.type = 'button';
  undoBtn.textContent = 'Undo';
  undoBtn.addEventListener('click', function () { onUndo(undoBtn); });
  line.appendChild(undoBtn);
  line.appendChild(document.createTextNode(' '));

  var dismissBtn = document.createElement('button');
  dismissBtn.type = 'button';
  dismissBtn.textContent = '↩';
  dismissBtn.addEventListener('click', onDismiss);
  line.appendChild(dismissBtn);

  return line;
}

function recordLabel(record) {
  var verb = record.type === 'ban' ? 'banned' : 'unbanned';
  if (record.entries.length === 1) {
    var e = record.entries[0];
    return verb + ' ' + (e.name ? e.name + ' ' : '') + (e.npub || e.pubkey);
  }
  return verb + ' ' + record.entries.length + ' pubkeys';
}

function undoRecord(record, btn) {
  btn.disabled = true;
  var req;
  if (record.type === 'ban') {
    req = signAndPost('/api/unban', {
      pubkeys: record.entries.map(function (e) { return e.pubkey; })
    });
  } else {
    req = signAndPost('/api/ban', {
      entries: record.entries.map(function (e) {
        return { pubkey: e.pubkey, reason: e.reason || '' };
      })
    });
  }
  req
    .then(function (result) {
      if (!result.ok) {
        btn.disabled = false;
        setStatus('undo failed: ' + (result.body && result.body.error ? result.body.error : 'unknown error'));
        return;
      }
      removeRecord(record.id);
      setStatus((record.type === 'ban' ? 'unbanned ' : 're-banned ') + record.entries.length + ' pubkey(s)');
      return loadBans();
    })
    .catch(function () {
      btn.disabled = false;
      setStatus('undo failed');
    });
}

function undoReportBan(pubkey, btn) {
  btn.disabled = true;
  signAndPost('/api/unban', { pubkeys: [pubkey] })
    .then(function (result) {
      if (!result.ok) {
        btn.disabled = false;
        setStatus('undo failed: ' + (result.body && result.body.error ? result.body.error : 'unknown error'));
        return;
      }
      setStatus('unbanned 1 pubkey');
      return loadBans();
    })
    .catch(function () {
      btn.disabled = false;
      setStatus('undo failed');
    });
}

function renderRecords() {
  undoList.textContent = '';
  if (!isAdmin) {
    return;
  }

  var records = loadStored(RECORDS_KEY);
  records.forEach(function (record) {
    if (!record || !Array.isArray(record.entries) || record.entries.length === 0) {
      return;
    }
    var line = buildRecordLine(
      recordLabel(record),
      function (btn) { undoRecord(record, btn); },
      function () { removeRecord(record.id); }
    );
    undoList.appendChild(line);
  });

  var dismissed = loadStored(DISMISSED_REPORTS_KEY);
  for (var i = 0; i < lastBanned.length; i++) {
    var ban = lastBanned[i];
    if (!ban.report_event_id) {
      continue;
    }
    var id = ban.report_event_id + ':' + ban.pubkey;
    if (dismissed.indexOf(id) !== -1) {
      continue;
    }
    var labelText = 'reported ' + (ban.name ? ban.name + ' ' : '') + ban.npub
      + (ban.report_type ? ' — ' + ban.report_type : '');
    var line = buildRecordLine(
      labelText,
      (function (pk) { return function (btn) { undoReportBan(pk, btn); }; })(ban.pubkey),
      (function (rid) { return function () { dismissReport(rid); }; })(id)
    );
    undoList.appendChild(line);
  }
}

unbanBtn.addEventListener('click', function () {
  if (!isAdmin) {
    return;
  }
  var checkboxes = listEl.querySelectorAll('.ban-checkbox:checked');
  var selected = [];
  for (var i = 0; i < checkboxes.length; i++) {
    selected.push(checkboxes[i].value);
  }
  if (selected.length === 0) {
    setStatus('nothing selected');
    return;
  }

  // Capture entries now — after loadBans they are gone from lastBanned.
  var entriesByPk = {};
  for (var i = 0; i < selected.length; i++) {
    var ban = findBan(selected[i]);
    entriesByPk[selected[i]] = {
      pubkey: selected[i],
      npub: ban ? ban.npub : null,
      name: ban ? ban.name : null,
      reason: ban ? ban.reason : ''
    };
  }

  signAndPost('/api/unban', { pubkeys: selected })
    .then(function (result) {
      if (!result.ok) {
        setStatus('unban failed: ' + (result.body && result.body.error ? result.body.error : 'unknown error'));
        return;
      }
      var removed = result.body.removed;
      setStatus('unbanned ' + removed.length + ' pubkey(s)');
      if (removed.length > 0) {
        addRecord({
          type: 'unban',
          at: Date.now(),
          entries: removed.map(function (pk) {
            return entriesByPk[pk] || { pubkey: pk, npub: null, name: null, reason: '' };
          })
        });
      }
      return loadBans();
    })
    .catch(function () {
      setStatus('unban failed');
    });
});

banForm.addEventListener('submit', function (evt) {
  evt.preventDefault();
  if (!isAdmin) {
    return;
  }
  var raw = banInput.value.split(/[\s,]+/).map(function (s) { return s.trim(); }).filter(Boolean);
  if (raw.length === 0) {
    setStatus('nothing to ban');
    return;
  }
  var reason = banReason.value;
  var entries = raw.map(function (pk) {
    return { pubkey: pk, reason: reason };
  });

  signAndPost('/api/ban', { entries: entries })
    .then(function (result) {
      if (!result.ok) {
        setStatus('ban failed: ' + (result.body && result.body.error ? result.body.error : 'unknown error'));
        return;
      }
      setStatus('banned ' + result.body.added.length + ' pubkey(s)'
        + (result.body.skipped.length ? ', skipped ' + result.body.skipped.length : ''));
      banInput.value = '';
      banReason.value = '';
      return loadBans().then(function () {
        // After loadBans so lastBanned has each ban's npub/name for the record.
        for (var i = 0; i < result.body.added.length; i++) {
          var pk = result.body.added[i];
          var ban = findBan(pk);
          addRecord({
            type: 'ban',
            at: Date.now(),
            entries: [{
              pubkey: pk,
              npub: ban ? ban.npub : null,
              name: ban ? ban.name : null,
              reason: reason
            }]
          });
        }
      });
    })
    .catch(function () {
      setStatus('ban failed');
    });
});

loadBans();
</script>
</body>
</html>
